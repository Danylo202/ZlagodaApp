spring.application.name=zlagoda
spring.datasource.url=jdbc:ucanaccess://${user.dir}/ZlagodaDB_Sadykov.accdb;memory=true
# spring.datasource.url=jdbc:ucanaccess://./ZlagodaDB_Sadykov.accdb;memory=true
spring.datasource.driver-class-name=net.ucanaccess.jdbc.UcanaccessDriver
# UCanAccess/Access is fragile with pooled connections: after writes, Hikari can reuse a closed
# internal HSQL connection and later SELECTs fail with "connection exception: closed".
# Use plain DriverManager connections instead of a pool.
spring.datasource.type=org.springframework.jdbc.datasource.DriverManagerDataSource

# Authentication is configured in SecurityConfig and reads BCrypt hashes from Employee.password_hash.

spring.sql.init.mode=never