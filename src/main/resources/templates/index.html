<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <title>ZLAGODA - Головна</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">ZLAGODA</span>
        <div class="d-flex align-items-center gap-3 text-white">
            <span sec:authorize="hasRole('MANAGER')">Менеджер: <strong th:text="${employeeId}">E01</strong></span>
            <span sec:authorize="hasRole('CASHIER')">Касир: <strong th:text="${employeeId}">E02</strong></span>
            <span class="badge bg-light text-primary" sec:authentication="principal.authorities">ROLE</span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Вийти</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="mb-4">
        <h1 class="h3 mb-1">Панель працівника</h1>
        <p class="text-muted mb-0">Оберіть потрібний розділ.</p>
    </div>

    <div class="row g-3">
        <div class="col-12 col-md-6 col-xl-4">
            <a th:href="@{/products}" class="card shadow-sm text-decoration-none text-dark h-100">
                <div class="card-body">
                    <h2 class="h5">Товари</h2>
                    <p class="text-muted mb-0">Перегляд списку товарів.</p>
                </div>
            </a>
        </div>

        <div class="col-12 col-md-6 col-xl-4">
            <a th:href="@{/categories}" class="card shadow-sm text-decoration-none text-dark h-100">
                <div class="card-body">
                    <h2 class="h5">Категорії</h2>
                    <p class="text-muted mb-0">Перегляд категорій товарів.</p>
                </div>
            </a>
        </div>

        <div class="col-12 col-md-6 col-xl-4" sec:authorize="hasAnyRole('MANAGER','CASHIER')">
            <div class="card shadow-sm h-100 border-secondary-subtle">
                <div class="card-body">
                    <h2 class="h5">Чеки</h2>
                    <p class="text-muted mb-0">Скоро буде доступно.</p>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-xl-4" sec:authorize="hasAnyRole('MANAGER','CASHIER')">
            <div class="card shadow-sm h-100 border-secondary-subtle">
                <div class="card-body">
                    <h2 class="h5">Клієнти</h2>
                    <p class="text-muted mb-0">Скоро буде доступно.</p>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-xl-4" sec:authorize="hasRole('MANAGER')">
            <div class="card shadow-sm h-100 border-secondary-subtle">
                <div class="card-body">
                    <h2 class="h5">Працівники</h2>
                    <p class="text-muted mb-0">Скоро буде доступно.</p>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-xl-4" sec:authorize="hasRole('MANAGER')">
            <div class="card shadow-sm h-100 border-secondary-subtle">
                <div class="card-body">
                    <h2 class="h5">Звіти</h2>
                    <p class="text-muted mb-0">Скоро буде доступно.</p>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
