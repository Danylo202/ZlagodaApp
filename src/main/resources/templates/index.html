<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('ZLAGODA - Головна')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="zl-main container">
    <div class="zl-title">
        <h1>Панель працівника</h1>
        <p>Оберіть потрібний розділ.</p>
    </div>

    <div class="row g-3">
        <div class="col-12 col-md-6 col-xl-4">
            <a th:href="@{/products}" class="card zl-card zl-card-hover text-decoration-none text-dark h-100">
                <div class="card-body">
                    <h2 class="h5">Товари</h2>
                    <p class="text-muted mb-0">Перегляд списку товарів.</p>
                </div>
            </a>
        </div>

        <div class="col-12 col-md-6 col-xl-4">
            <a th:href="@{/categories}" class="card zl-card zl-card-hover text-decoration-none text-dark h-100">
                <div class="card-body">
                    <h2 class="h5">Категорії</h2>
                    <p class="text-muted mb-0">Перегляд категорій товарів.</p>
                </div>
            </a>
        </div>

        <div class="col-12 col-md-6 col-xl-4" sec:authorize="hasAnyRole('MANAGER','CASHIER')">
            <div class="card zl-card h-100">
                <div class="card-body">
                    <h2 class="h5 text-muted">Чеки</h2>
                    <p class="text-muted mb-0">Скоро буде доступно.</p>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-xl-4" sec:authorize="hasAnyRole('MANAGER','CASHIER')">
            <div class="card zl-card h-100">
                <div class="card-body">
                    <h2 class="h5 text-muted">Клієнти</h2>
                    <p class="text-muted mb-0">Скоро буде доступно.</p>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-xl-4" sec:authorize="hasRole('MANAGER')">
            <div class="card zl-card h-100">
                <div class="card-body">
                    <h2 class="h5 text-muted">Працівники</h2>
                    <p class="text-muted mb-0">Скоро буде доступно.</p>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-xl-4" sec:authorize="hasRole('MANAGER')">
            <div class="card zl-card h-100">
                <div class="card-body">
                    <h2 class="h5 text-muted">Звіти</h2>
                    <p class="text-muted mb-0">Скоро буде доступно.</p>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
