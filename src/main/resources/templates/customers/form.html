<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ZLAGODA - Клієнт')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar-back(@{/customers}, 'Назад до списку')}"></nav>

<main class="zl-main container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card zl-card">
                <div class="card-header">Карта клієнта</div>
                <div class="card-body">
                    <div class="zl-title">
                        <h1>Новий клієнт</h1>
                        <p>Введіть відомості про постійного клієнта.</p>
                    </div>

                    <div th:replace="~{fragments/layout :: placeholder-banner('')}"></div>

                    <form>
                        <div class="mb-3"><label class="form-label">Номер карти</label><input class="form-control" disabled placeholder="Номер"></div>
                        <div class="mb-3"><label class="form-label">ПІБ</label><input class="form-control" disabled placeholder="Прізвище Ім'я По батькові"></div>
                        <div class="mb-3"><label class="form-label">Телефон</label><input class="form-control" disabled placeholder="+380..."></div>
                        <div class="mb-3"><label class="form-label">Адреса (необов'язково)</label><input class="form-control" disabled placeholder="Місто, вулиця, індекс"></div>
                        <div class="mb-3"><label class="form-label">Відсоток знижки</label><input class="form-control" disabled placeholder="0"></div>
                        <div class="d-flex gap-2 mt-4">
                            <button class="btn btn-primary" disabled>Зберегти</button>
                            <a th:href="@{/customers}" class="btn btn-outline-secondary">Скасувати</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
