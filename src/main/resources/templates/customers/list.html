<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('ZLAGODA - Клієнти')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="zl-main container-fluid">
    <div class="zl-layout">
        <div th:replace="~{fragments/layout :: sidebar('customers')}"></div>

        <section>
            <div class="card zl-card">
                <div class="card-body">
                    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                        <div class="zl-title mb-0">
                            <h1>Постійні клієнти</h1>
                            <p>Карти клієнтів із відсотком знижки, відсортовані за прізвищем.</p>
                        </div>
                        <a th:href="@{/customers/new}" class="btn btn-primary">Додати клієнта</a>
                    </div>

                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <span th:text="${success}">Успішно</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <span th:text="${error}">Помилка</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <form th:action="@{/customers}" method="get" class="row g-2 align-items-end mb-3">
                        <div class="col-md-4">
                            <label for="surname" class="form-label">Пошук за прізвищем</label>
                            <input id="surname" name="surname" type="text" class="form-control" th:value="${surname}" placeholder="Прізвище">
                        </div>
                        <div class="col-md-3">
                            <label for="percent" class="form-label">Знижка, %</label>
                            <input id="percent" name="percent" type="number" min="0" class="form-control" th:value="${percent}" placeholder="Наприклад: 5">
                        </div>
                        <div class="col-md-5 d-flex gap-2">
                            <button type="submit" class="btn btn-outline-primary">Застосувати</button>
                            <a th:href="@{/customers}" class="btn btn-outline-secondary">Скинути</a>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0 zl-table">
                            <thead>
                            <tr>
                                <th>Номер карти</th>
                                <th>ПІБ</th>
                                <th>Телефон</th>
                                <th>Адреса</th>
                                <th>Знижка %</th>
                                <th class="text-end">Дії</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="customer : ${customers}">
                                <td th:text="${customer.cardNumber}">C001</td>
                                <td>
                                    <span th:text="${customer.custSurname}">Прізвище</span>
                                    <span th:text="${customer.custName}">Ім'я</span>
                                    <span th:if="${customer.custPatronymic}" th:text="${customer.custPatronymic}">По батькові</span>
                                </td>
                                <td th:text="${customer.phoneNumber}">+380...</td>
                                <td>
                                    <span th:if="${#strings.isEmpty(customer.city) and #strings.isEmpty(customer.street) and #strings.isEmpty(customer.zipCode)}" class="text-muted">—</span>
                                    <th:block th:unless="${#strings.isEmpty(customer.city) and #strings.isEmpty(customer.street) and #strings.isEmpty(customer.zipCode)}">
                                        <span th:if="${!#strings.isEmpty(customer.city)}" th:text="${customer.city}">Місто</span>
                                        <span th:if="${!#strings.isEmpty(customer.city) and (!#strings.isEmpty(customer.street) or !#strings.isEmpty(customer.zipCode))}">, </span>
                                        <span th:if="${!#strings.isEmpty(customer.street)}" th:text="${customer.street}">Вулиця</span>
                                        <span th:if="${!#strings.isEmpty(customer.street) and !#strings.isEmpty(customer.zipCode)}">, </span>
                                        <span th:if="${!#strings.isEmpty(customer.zipCode)}" th:text="${customer.zipCode}">Індекс</span>
                                    </th:block>
                                </td>
                                <td th:text="${customer.percent}">0</td>
                                <td class="text-end">
                                    <a th:href="@{/customers/{number}/edit(number=${customer.cardNumber})}" class="btn btn-warning btn-sm">Редагувати</a>
                                    <form sec:authorize="hasRole('MANAGER')" th:action="@{/customers/{number}/delete(number=${customer.cardNumber})}" method="get" class="d-inline">
                                        <button type="submit" class="btn btn-danger btn-sm"
                                                data-zl-confirm="Видалити цю карту клієнта?"
                                                data-zl-confirm-title="Видалити клієнта"
                                                data-zl-confirm-ok="Видалити">Видалити</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(customers)}">
                                <td colspan="6" class="zl-empty">Клієнтів не знайдено</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>
<div th:replace="~{fragments/layout :: confirm-modal}"></div>
</body>
</html>
