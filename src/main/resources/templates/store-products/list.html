<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('ZLAGODA - Товари у магазині')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="zl-main container-fluid">
    <div class="zl-layout">
        <div th:replace="~{fragments/layout :: sidebar('store-products')}"></div>

        <section>
            <div class="card zl-card">
                <div class="card-body">
                    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                        <div class="zl-title mb-0">
                            <h1>Товари у магазині</h1>
                            <p>Запаси товарів: UPC, ціна, кількість, акційний/звичайний.</p>
                        </div>
                        <a sec:authorize="hasRole('MANAGER')" th:href="@{/store-products/new}" class="btn btn-primary">Додати товар у магазині</a>
                    </div>


                    <form th:action="@{/store-products}" method="get" class="row g-3 mb-4 p-3 bg-white shadow-sm rounded">
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Пошук за UPC</label>
                            <input type="text" name="upc" class="form-control" placeholder="Введіть штрих-код..." th:value="${param.upc}">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Тип товару</label>
                            <select name="promo" class="form-select">
                                <option value="">Усі товари</option>
                                <option value="true" th:selected="${param.promo == 'true'}">Тільки Акційні</option>
                                <option value="false" th:selected="${param.promo == 'false'}">Тільки Звичайні</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label small fw-bold">Сортувати за</label>
                            <select name="sort" class="form-select">
                                <option value="name" th:selected="${param.sort == 'name'}">Назвою (А-Я)</option>
                                <option value="quantity" th:selected="${param.sort == 'quantity'}">Кількістю (max)</option>
                            </select>
                        </div>

                        <div class="col-md-3 d-flex align-items-end gap-2">
                            <button type="submit" class="btn btn-primary w-100">Застосувати</button>
                            <a th:href="@{/store-products}" class="btn btn-outline-secondary">❌</a>
                        </div>
                    </form>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0 zl-table">
                            <thead>
                            <tr>
                                <th>UPC (штрих-код)</th>
                                <th>Назва товару</th>
                                <th>Ціна</th>
                                <th>К-сть</th>
                                <th>Тип</th>
                                <th sec:authorize="hasRole('MANAGER')" class="text-end">Дії</th>
                            </tr>
                            </thead>
                            <tbody>
                                <tr th:each="sp : ${storeProducts}">
                                    <td th:text="${sp.UPC}">000111222</td>
                                    
                                    <td th:text="${sp.productName}" class="fw-bold">Назва товару</td>
                                    
                                    <td th:text="${sp.sellingPrice + ' ₴'}">0.00</td>
                                    <td th:text="${sp.productsNumber}">0</td>
                                    <td>
                                        <span th:if="${sp.promotionalProduct}" class="badge bg-danger">Акція</span>
                                        <span th:unless="${sp.promotionalProduct}" class="badge bg-secondary">Звичайний</span>
                                    </td>
                                    <td sec:authorize="hasRole('MANAGER')" class="text-end">
                                        <div class="btn-group">
                                            <a th:href="@{'/store-products/edit/' + ${sp.UPC}}"
                                               class="btn btn-sm btn-warning">Редагувати</a>
                                            <form th:action="@{/store-products/delete/{upc}(upc=${sp.UPC})}" method="post" class="d-inline">
                                                <button type="submit" class="btn btn-sm btn-danger"
                                                        data-zl-confirm="Ви впевнені, що хочете видалити цей товар?"
                                                        data-zl-confirm-title="Видалити товар"
                                                        data-zl-confirm-ok="Видалити">Видалити</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>
<div th:replace="~{fragments/layout :: confirm-modal}"></div>
</body>
</html>
