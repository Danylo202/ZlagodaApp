<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ZLAGODA - Звіт: Товари у магазині')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar-back(@{/reports}, 'Назад до звітів')}"></nav>

<main class="zl-main container-fluid">
    <section class="zl-report">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3 zl-no-print">
            <div class="zl-title mb-0">
                <h1 th:text="${title}">Звіт</h1>
            </div>
            <button class="btn btn-primary" onclick="window.print()">&#x1F5A8; Друк</button>
        </div>

        <!-- Promo toggle -->
        <div class="card zl-card mb-3 zl-no-print">
            <div class="card-body">
                <div class="d-flex gap-2 align-items-center flex-wrap">
                    <span class="text-muted">Фільтр:</span>
                    <a th:href="@{/reports/store-products}" class="btn btn-sm" th:classappend="${promo == null} ? 'btn-primary' : 'btn-outline-secondary'">Усі</a>
                    <a th:href="@{/reports/store-products(promo=true)}" class="btn btn-sm" th:classappend="${promo != null && promo} ? 'btn-primary' : 'btn-outline-secondary'">Акційні</a>
                    <a th:href="@{/reports/store-products(promo=false)}" class="btn btn-sm" th:classappend="${promo != null && !promo} ? 'btn-primary' : 'btn-outline-secondary'">Неакційні</a>
                </div>
            </div>
        </div>

        <div class="card zl-card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table zl-table" th:if="${!storeProducts.isEmpty()}">
                        <thead>
                            <tr>
                                <th>UPC</th>
                                <th>Назва товару</th>
                                <th>Ціна</th>
                                <th>Кількість</th>
                                <th>Акційний</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="sp : ${storeProducts}">
                                <td th:text="${sp.UPC}"></td>
                                <td th:text="${sp.productName}"></td>
                                <td th:text="${#numbers.formatDecimal(sp.sellingPrice, 0, 'COMMA', 2, 'POINT')}"></td>
                                <td th:text="${sp.productsNumber}"></td>
                                <td>
                                    <span th:if="${sp.promotionalProduct}" class="badge zl-badge" style="background:#fff3cd;color:#856404">Акція</span>
                                    <span th:unless="${sp.promotionalProduct}" class="text-muted">—</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${storeProducts.isEmpty()}" class="zl-empty">Даних не знайдено.</div>
                </div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
