<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ZLAGODA - Звіт: Товари')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar-back(@{/reports}, 'Назад до звітів')}"></nav>

<main class="zl-main container-fluid">
    <section class="zl-report">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3 zl-no-print">
            <div class="zl-title mb-0">
                <h1 th:text="${title}">Звіт</h1>
            </div>
            <button class="btn btn-primary" onclick="window.print()">&#x1F5A8; Друк</button>
        </div>

        <!-- Category filter form -->
        <div class="card zl-card mb-3 zl-no-print">
            <div class="card-body">
                <form th:action="@{/reports/products}" method="get" class="row g-2 align-items-end">
                    <div class="col-auto">
                        <label for="categoryName" class="form-label">Назва категорії</label>
                        <input type="text" id="categoryName" name="categoryName" class="form-control" th:value="${categoryName}" placeholder="Введіть назву категорії...">
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary">Знайти</button>
                        <a th:href="@{/reports/products}" class="btn btn-outline-secondary">Скинути</a>
                    </div>
                </form>
            </div>
        </div>

        <div class="card zl-card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table zl-table" th:if="${!products.isEmpty()}">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Назва</th>
                                <th>Виробник</th>
                                <th>Характеристики</th>
                                <th>Категорія</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${products}">
                                <td th:text="${p.idProduct}"></td>
                                <td th:text="${p.productName}"></td>
                                <td th:text="${p.producer}"></td>
                                <td th:text="${p.characteristics}"></td>
                                <td><span class="badge zl-badge" th:text="${p.categoryName}"></span></td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${products.isEmpty()}" class="zl-empty">Даних не знайдено.</div>
                </div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
