<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ZLAGODA - Звіт: Чеки')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar-back(@{/reports}, 'Назад до звітів')}"></nav>

<main class="zl-main container-fluid">
    <section class="zl-report">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3 zl-no-print">
            <div class="zl-title mb-0">
                <h1 th:text="${title}">Звіт: Чеки</h1>
            </div>
            <div th:if="${checks != null}">
                <button class="btn btn-primary" onclick="window.print()">&#x1F5A8; Друк</button>
            </div>
        </div>

        <!-- Filter form -->
        <div class="card zl-card mb-3 zl-no-print">
            <div class="card-body">
                <form th:action="@{/reports/checks}" method="get" class="row g-2 align-items-end">
                    <div class="col-auto">
                        <label for="idEmployee" class="form-label">ID касира</label>
                        <input type="text" id="idEmployee" name="idEmployee" class="form-control" th:value="${idEmployee}" placeholder="Залиште порожнім для всіх">
                    </div>
                    <div class="col-auto">
                        <label for="date1" class="form-label">Дата з</label>
                        <input type="date" id="date1" name="date1" class="form-control" th:value="${date1}">
                    </div>
                    <div class="col-auto">
                        <label for="date2" class="form-label">Дата по</label>
                        <input type="date" id="date2" name="date2" class="form-control" th:value="${date2}">
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary">Фільтрувати</button>
                        <a th:href="@{/reports/checks}" class="btn btn-outline-secondary">Скинути</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Results -->
        <div class="card zl-card" th:if="${checks != null}">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table zl-table" th:if="${!checks.isEmpty()}">
                        <thead>
                            <tr>
                                <th>Номер</th>
                                <th>Касир</th>
                                <th>Карта клієнта</th>
                                <th>Дата</th>
                                <th>Сума</th>
                                <th>ПДВ</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${checks}">
                                <td th:text="${c.checkNumber}"></td>
                                <td th:text="${c.idEmployee}"></td>
                                <td th:text="${c.cardNumber} ?: '—'"></td>
                                <td th:text="${c.printDate}"></td>
                                <td th:text="${#numbers.formatDecimal(c.sumTotal, 0, 'COMMA', 2, 'POINT')}"></td>
                                <td th:text="${#numbers.formatDecimal(c.vat, 0, 'COMMA', 2, 'POINT')}"></td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${checks.isEmpty()}" class="zl-empty">Чеків не знайдено.</div>
                </div>
            </div>
        </div>
    </section>
</main>
</body>
</html>
