<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('ZLAGODA - Товари')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="zl-main container-fluid">
    <div class="zl-layout">
        <div th:replace="~{fragments/layout :: sidebar('products')}"></div>

        <section>
            <div class="card zl-card">
                <div class="card-body">
                    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                        <div class="zl-title mb-0">
                            <h1>Товари</h1>
                            <p>Список товарів із бази даних.</p>
                        </div>
                        <div sec:authorize="hasRole('MANAGER')">
                            <a th:href="@{/products/new}" class="btn btn-primary">Додати новий</a>
                        </div>
                    </div>

                    <div class="input-group mb-3">
                        <input type="text" class="form-control" placeholder="Пошук товарів...">
                        <button class="btn btn-outline-primary" type="button">Пошук</button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0 zl-table">
                            <thead>
                            <tr>
                                <th>Назва товару</th>
                                <th>Виробник</th>
                                <th>Характеристики</th>
                                <th>Категорія</th>
                                <th sec:authorize="hasRole('MANAGER')">Дії</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="product : ${products}">
                                <td th:text="${product.productName}">Назва</td>
                                <td th:text="${product.producer}">Виробник</td>
                                <td th:text="${product.characteristics}">Опис</td>
                                <td><span class="badge zl-badge" th:text="${product.categoryName}">Категорія</span></td>

                                <td sec:authorize="hasRole('MANAGER')">
                                    <div class="btn-group">
                                        <a th:href="@{'/products/edit/' + ${product.idProduct}}"
                                           class="btn btn-sm btn-warning">Редагувати</a>
                                        <a th:href="@{'/products/delete/' + ${product.idProduct}}"
                                           class="btn btn-sm btn-danger"
                                           onclick="return confirm('Ви впевнені?')">Видалити</a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(products)}">
                                <td colspan="6" class="zl-empty">Товарів не знайдено</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>
</body>
</html>
