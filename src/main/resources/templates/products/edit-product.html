<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${mode == 'create' ? 'ZLAGODA - Додати товар' : 'ZLAGODA - Редагувати товар'})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar-back(@{/products}, 'Назад до списку')}"></nav>

<main class="zl-main container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card zl-card">
                <div class="card-header"
                     th:text="${mode == 'create' ? 'Створення картки товару' : 'Зміна даних товару'}">
                    Параметри
                </div>
                <div class="card-body">
                    <div class="zl-title">
                        <h1 th:text="${mode == 'create' ? 'Новий товар' : 'Редагування товару'}">Товар</h1>
                        <p>Заповніть поля нижче.</p>
                    </div>

                    <form th:action="@{/products/save}" th:object="${product}" method="post">
                        <input type="hidden" th:field="*{idProduct}">

                        <div class="mb-3">
                            <label class="form-label">Назва товару</label>
                            <input type="text" th:field="*{productName}" class="form-control"
                                   placeholder="Наприклад: Молоко 2.5%" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Виробник</label>
                            <input type="text" th:field="*{producer}" class="form-control"
                                   placeholder="Наприклад: Галичина" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Категорія</label>
                            <select th:field="*{categoryNumber}" class="form-select" required>
                                <option value="" th:disabled="${mode != 'create'}">Оберіть категорію...</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.categoryNumber}"
                                        th:text="${cat.categoryName}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Характеристики</label>
                            <textarea th:field="*{characteristics}" class="form-control" rows="3"
                                      placeholder="Опис товару..."></textarea>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary"
                                    th:text="${mode == 'create' ? 'Додати товар' : 'Зберегти зміни'}">
                                Дія
                            </button>
                            <a th:href="@{/products}" class="btn btn-outline-secondary">Скасувати</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
