<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ZLAGODA - Немає доступу</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">ZLAGODA</a>
        <form th:action="@{/logout}" method="post" class="m-0">
            <button type="submit" class="btn btn-outline-light btn-sm">Вийти</button>
        </form>
    </div>
</nav>

<main class="container py-5">
    <div class="card shadow-sm mx-auto text-center" style="max-width: 640px;">
        <div class="card-body p-5">
            <div class="display-1 fw-bold text-danger">403</div>
            <h1 class="h3 mb-3">Немає доступу</h1>
            <p class="text-muted mb-4">
                У вашої ролі немає прав для перегляду цієї сторінки.
            </p>
            <div class="d-flex justify-content-center gap-2">
                <a th:href="@{/}" class="btn btn-primary">На головну панель</a>
                <button type="button" class="btn btn-outline-secondary" onclick="history.back()">Назад</button>
            </div>
        </div>
    </div>
</main>
</body>
</html>
