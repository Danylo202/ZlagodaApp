<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <title>ZLAGODA - Категорії</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">ZLAGODA</a>
        <div class="d-flex align-items-center gap-3 text-white">
            <span>Працівник: <strong th:text="${employeeId}">E01</strong></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Вийти</button>
            </form>
        </div>
    </div>
</nav>

<main class="container-fluid py-4">
    <div class="row g-4">
        <aside class="col-12 col-lg-3 col-xl-2">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold">Меню управління</div>
                <div class="list-group list-group-flush">
                    <a th:href="@{/}" class="list-group-item list-group-item-action">Головна</a>
                    <a th:href="@{/products}" class="list-group-item list-group-item-action">Товари</a>
                    <a th:href="@{/categories}" class="list-group-item list-group-item-action active">Категорії</a>
                    <a href="#" class="list-group-item list-group-item-action" sec:authorize="hasAnyRole('MANAGER','CASHIER')">Чеки</a>
                    <a href="#" class="list-group-item list-group-item-action" sec:authorize="hasAnyRole('MANAGER','CASHIER')">Клієнти</a>
                    <a href="#" class="list-group-item list-group-item-action" sec:authorize="hasRole('MANAGER')">Працівники</a>
                    <a href="#" class="list-group-item list-group-item-action" sec:authorize="hasRole('MANAGER')">Звіти</a>
                </div>
            </div>
        </aside>

        <section class="col-12 col-lg-9 col-xl-10">
            <div class="card shadow-sm">
                <div class="card-header d-flex flex-wrap justify-content-between align-items-center gap-2">
                    <div>
                        <h1 class="h3 mb-1">Категорії</h1>
                        <p class="text-muted mb-0">Список категорій товарів.</p>
                    </div>
                    <div class="btn-group" sec:authorize="hasRole('MANAGER')">
                        <button type="button" class="btn btn-success">Додати</button>
                        <button type="button" class="btn btn-warning">Редагувати</button>
                        <button type="button" class="btn btn-danger">Видалити</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Назва</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="cat : ${categories}">
                            <td th:text="${cat.category_number}">1</td>
                            <td th:text="${cat.category_name}">Назва</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="2" class="text-center text-muted py-4">Категорій не знайдено</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
</main>
</body>
</html>
