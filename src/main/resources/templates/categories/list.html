<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <title>ZLAGODA - Категорії</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">ZLAGODA</a>
        <div class="d-flex align-items-center gap-3 text-white">
            <span>Працівник: <strong th:text="${employeeId}">E01</strong></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Вийти</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
            <h1 class="h3 mb-1">Категорії товарів</h1>
            <p class="text-muted mb-0">Перегляд доступний менеджеру і касиру. Зміни — лише менеджеру.</p>
        </div>
        <a sec:authorize="hasRole('MANAGER')" th:href="@{/categories/new}" class="btn btn-success">Додати категорію</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th style="width: 140px;">ID</th>
                    <th>Назва</th>
                    <th sec:authorize="hasRole('MANAGER')" class="text-end" style="width: 220px;">Дії</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cat : ${categories}">
                    <td th:text="${cat.category_number}">1</td>
                    <td th:text="${cat.category_name}">Назва</td>
                    <td sec:authorize="hasRole('MANAGER')" class="text-end">
                        <a th:href="@{/categories/{id}/edit(id=${cat.category_number})}" class="btn btn-warning btn-sm">Редагувати</a>
                        <form th:action="@{/categories/{id}/delete(id=${cat.category_number})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Видалити цю категорію?')">Видалити</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(categories)}">
                    <td colspan="3" class="text-center text-muted py-4">Категорій не знайдено</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <a th:href="@{/}" class="btn btn-outline-secondary mt-3">Назад на панель</a>
</main>
</body>
</html>
