<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="${mode == 'edit' ? 'ZLAGODA - Редагувати категорію' : 'ZLAGODA - Нова категорія'}">ZLAGODA - Категорія</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}">ZLAGODA</a>
        <div class="d-flex align-items-center gap-3 text-white">
            <span sec:authorize="hasRole('MANAGER')">Менеджер: <strong th:text="${employeeId}">E01</strong></span>
            <span sec:authorize="hasRole('CASHIER')">Касир: <strong th:text="${employeeId}">E02</strong></span>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Вийти</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="card shadow-sm mx-auto" style="max-width: 720px;">
        <div class="card-body">
            <h1 class="h3 mb-3" th:text="${mode == 'edit' ? 'Редагувати категорію' : 'Додати категорію'}">Категорія</h1>

            <form th:object="${category}"
                  th:action="${mode == 'edit'} ? @{/categories/{id}(id=${category.category_number})} : @{/categories}"
                  method="post">
                <div class="mb-3">
                    <label for="category_number" class="form-label">Номер категорії</label>
                    <input id="category_number"
                           name="category_number"
                           th:field="*{category_number}"
                           type="number"
                           min="1"
                           class="form-control"
                           th:readonly="${mode == 'edit'}"
                           required>
                    <div class="form-text">У режимі редагування номер не змінюється.</div>
                </div>

                <div class="mb-3">
                    <label for="category_name" class="form-label">Назва категорії</label>
                    <input id="category_name"
                           name="category_name"
                           th:field="*{category_name}"
                           type="text"
                           maxlength="50"
                           class="form-control"
                           required>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Зберегти</button>
                    <a th:href="@{/categories}" class="btn btn-outline-secondary">Скасувати</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
