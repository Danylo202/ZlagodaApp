<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${mode == 'edit' ? 'ZLAGODA - Редагувати категорію' : 'ZLAGODA - Нова категорія'})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar-back(@{/categories}, 'Назад до списку')}"></nav>

<main class="zl-main container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card zl-card">
                <div class="card-body">
                    <div class="zl-title">
                        <h1 th:text="${mode == 'edit' ? 'Редагувати категорію' : 'Додати категорію'}">Категорія</h1>
                        <p>Введіть назву категорії (до 50 символів).</p>
                    </div>

                    <form th:object="${category}" th:action="@{/categories/save}" method="post">
                        <div class="mb-3">
                            <input type="hidden" th:field="*{categoryNumber}">
                        </div>

                        <div class="mb-3">
                            <label for="categoryName" class="form-label">Назва категорії</label>
                            <input id="categoryName"
                                   name="categoryName"
                                   th:field="*{categoryName}"
                                   type="text"
                                   maxlength="50"
                                   class="form-control"
                                   required>
                        </div>

                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <span th:text="${error}">Помилка</span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <span th:text="${success}">Успішно</span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Зберегти</button>
                            <a th:href="@{/categories}" class="btn btn-outline-secondary">Скасувати</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
