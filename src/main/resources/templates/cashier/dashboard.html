<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ZLAGODA - Панель касира')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="zl-main container">
    <div class="zl-title">
        <h1>Панель касира</h1>
        <p>Касир створює чеки, переглядає товари та працює з картами клієнтів.</p>
    </div>

    <div class="row g-3">
        <div class="col-12 col-md-6 col-xl-4">
            <a th:href="@{/receipts/new}" class="card zl-card zl-card-hover text-decoration-none text-dark h-100">
                <div class="card-body">
                    <h2 class="h5">Новий чек</h2>
                    <p class="text-muted mb-0">Оформлення продажу товарів.</p>
                </div>
            </a>
        </div>
        <div class="col-12 col-md-6 col-xl-4">
            <a th:href="@{/products}" class="card zl-card zl-card-hover text-decoration-none text-dark h-100">
                <div class="card-body">
                    <h2 class="h5">Товари</h2>
                    <p class="text-muted mb-0">Перегляд і пошук товарів.</p>
                </div>
            </a>
        </div>
        <div class="col-12 col-md-6 col-xl-4">
            <a th:href="@{/categories}" class="card zl-card zl-card-hover text-decoration-none text-dark h-100">
                <div class="card-body">
                    <h2 class="h5">Категорії</h2>
                    <p class="text-muted mb-0">Перегляд категорій товарів.</p>
                </div>
            </a>
        </div>
        <div class="col-12 col-md-6 col-xl-4">
            <a th:href="@{/customers}" class="card zl-card zl-card-hover text-decoration-none text-dark h-100">
                <div class="card-body">
                    <h2 class="h5">Клієнти</h2>
                    <p class="text-muted mb-0">Додавання/редагування карт клієнта.</p>
                </div>
            </a>
        </div>
        <div class="col-12 col-md-6 col-xl-4">
            <a th:href="@{/receipts}" class="card zl-card zl-card-hover text-decoration-none text-dark h-100">
                <div class="card-body">
                    <h2 class="h5">Мої чеки</h2>
                    <p class="text-muted mb-0">Чеки за сьогодні або період.</p>
                </div>
            </a>
        </div>
    </div>
</main>
</body>
</html>
