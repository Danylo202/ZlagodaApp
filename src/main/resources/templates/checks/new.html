<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('ZLAGODA - Новий чек')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar-back(@{/checks}, 'Назад до списку')}"></nav>

<main class="zl-main container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card zl-card">
                <div class="card-header">Продаж товарів</div>
                <div class="card-body">
                    <div class="zl-title">
                        <h1>Новий чек</h1>
                        <p>Створення запису чеку. ПДВ має становити 20% від загальної суми.</p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}">Помилка</div>

                    <form th:object="${check}" th:action="@{/checks/save}" method="post">
                        <input type="hidden" th:field="*{idEmployee}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="cardNumber" class="form-label">Карта клієнта (необов'язково)</label>
                                <input id="cardNumber" th:field="*{cardNumber}" type="text" maxlength="13" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label for="printDate" class="form-label zl-required">Дата друку</label>
                                <input id="printDate" th:field="*{printDate}" type="date" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label for="sumTotal" class="form-label zl-required">Загальна сума</label>
                                <input id="sumTotal" th:field="*{sumTotal}" type="number" min="0" step="0.01" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label for="vat" class="form-label zl-required">ПДВ</label>
                                <input id="vat" th:field="*{vat}" type="number" min="0" step="0.01" class="form-control" required>
                                <div class="form-text">Наприклад, для суми 100.00 ПДВ = 20.00.</div>
                            </div>
                        </div>

                        <div th:replace="~{fragments/layout :: form-actions('Оформити чек', @{/checks}, false)}"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
